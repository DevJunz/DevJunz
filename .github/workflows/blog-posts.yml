name: Update blog posts

on:
  schedule:
    # 매일 자정(UTC 기준, 한국시간 오전 9시)에 실행
    - cron: "0 0 * * *"
  workflow_dispatch: # Actions 탭에서 수동 실행도 가능

permissions:
  contents: write

jobs:
  update-readme-with-blog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull latest blog posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://pinkcamel.tistory.com/rss"
          # 티스토리가 봇 요청을 406으로 거부하므로 브라우저처럼 보이게 설정
          user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36"
          accept_header: "*/*"
          max_post_count: 3
          # 표시 형식 커스터마이징: $newline을 앞에 둬야 START 마커와 줄이 분리됨
          template: "$newline- [$title]($url) — $date"
          date_format: "yyyy.mm.dd"
